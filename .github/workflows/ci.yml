# -----------------------------------------------------------------------------
# carrot-code — Continuous Integration
#
# Constitution v1.1.0 Principle VIII ("Ships From Day One"):
#   - Every PR and every push to main MUST run typecheck + lint + test + build.
#   - Coverage is reported as an artifact for visibility but is NEVER a gate
#     (Principle VI).
#
# Once this workflow has run once on a PR and produced a status check named
# "ci" (the job below), come back and add it to branch protection on `main`
# via: gh api -X PUT repos/jasaimial/carrot-code/branches/main/protection
# referencing the required_status_checks.contexts list.
#
# See:
#   specs/001-vertical-slice/plan.md#technical-context
#   specs/001-vertical-slice/tasks.md  (T009)
# -----------------------------------------------------------------------------

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual reruns from the Actions tab

# Only one in-flight run per branch / PR. Cancel older runs when a new
# commit lands — saves minutes and stops stale failures from confusing the
# UI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only token by default. If we ever need write access (e.g. to comment
# coverage on a PR), grant it at the job level.
permissions:
  contents: read

jobs:
  ci:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` is stricter than `npm install`: it requires package-lock.json,
      # fails on any drift, and is reproducible. Right call for CI.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint .)
        run: npm run lint

      - name: Format check (prettier --check .)
        run: npm run format:check

      - name: Test (vitest run with coverage)
        run: npm run test:coverage

      - name: Build (vite build)
        run: npm run build

      # Coverage is reported as an artifact for visibility per Principle VI.
      # Uploaded on every run (even on failure) so a failing test still leaves
      # the partial report behind for inspection.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      # The built dist/ is the deployable artifact. Netlify will deploy from
      # source on its own (T010 + T058), but uploading here means a green CI
      # run also leaves a downloadable build behind for sanity-checking.
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
